<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Treasure Hunt</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      max-width: 500px;
      margin: 0 auto;
      padding: 20px;
    }
    input, textarea, select, button {
      display: block;
      width: 100%;
      margin: 10px 0;
      padding: 10px;
      font-size: 16px;
    }
    label {
      font-weight: bold;
      margin-top: 10px;
    }
    .hidden { display: none; }
  </style>
</head>
<body>
  <h1>Treasure Hunt</h1>

  <!-- STEP 1: TEAM INFO -->
  <div id="pre-form">
    <label>Team Name</label>
    <input type="text" id="team-name" placeholder="Team Phoenix" />

    <label>Station</label>
    <select id="station">
      <option value="1">Station 1 - Library</option>
      <option value="2">Station 2 - Playground</option>
      <option value="3">Station 3 - Main Gate</option>
      <!-- later you can add 4–9 -->
    </select>

    <button onclick="openStation()">Go to Station</button>
  </div>

  <!-- STEP 2: STATION NONOGRAM CLUE + SELFIE -->
  <div id="station-form" class="hidden">
    <h2 id="station-title"></h2>

    <p>
      Use this link to build your nonogram for each station:<br/>
      <a href="https://rendersnail.com/tools/nonogram-builder" target="_blank">
        https://rendersnail.com/tools/nonogram-builder
      </a>
      and paste clues here for each station.
    </p>

    <label>Discovered letter (1 character)</label>
    <input type="text" id="letter" maxlength="1" placeholder="e.g. A" />

    <label>Selfie with QR (hold QR in photo)</label>
    <input type="file" id="photo" accept="image/*" />

    <button onclick="submitStation()">Submit Station</button>
  </div>

  <script>
    function openStation() {
      const teamName = document.getElementById("team-name").value.trim();
      const station = document.getElementById("station").value;

      if (!teamName) {
        alert("Please enter your team name");
        return;
      }

      document.getElementById("pre-form").classList.add("hidden");
      document.getElementById("station-form").classList.remove("hidden");

      document.getElementById("station-title").textContent =
        `Station ${station} - Nonogram Clue`;
    }

    async function submitStation() {
      const teamName = document.getElementById("team-name").value.trim();
      const station = document.getElementById("station").value;
      const letter = document.getElementById("letter").value.trim();
      const photoInput = document.getElementById("photo");
      const photoFile = photoInput.files[0];

      if (!letter || !photoFile) {
        alert("Please enter a letter and upload a selfie");
        return;
      }

      // Read photo as a data URL (we store it embedded in Sheet as base64 image)
      const reader = new FileReader();
      reader.onload = async function (e) {
        const photoUrl = e.target.result; // data URL

        const payload = {
          teamName,
          station,
          stationName: `Station ${station}`,
          letter: letter.toUpperCase(),
          photoUrl,
        };

        // 👇 REPLACE this URL with YOUR Web App URL from Apps Script
        const webhookUrl = "https://script.google.com/a/macros/iiitdm.ac.in/s/AKfycbyuIsG2YLK525o_ITDmWKm_fGGO4QUnpRmr3atUAKOJPoADpSr32bTmr2V830BQFBnO/exec";

        const res = await fetch(webhookUrl, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });

        if (res.ok) {
          alert("Submitted successfully! ✅ Team " + teamName);
        } else {
          alert("Error submitting. Check console.");
        }
      };
      reader.readAsDataURL(photoFile);
    }
  </script>
</body>
</html>
